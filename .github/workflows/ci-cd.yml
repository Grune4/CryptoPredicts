name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  DOCKER_REGISTRY: docker.io
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  test:
    runs-on: ubuntu-latest
    name: Test & Build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Run backend tests
        run: |
          cd backend
          mvn clean test --batch-mode

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Run frontend linting
        run: |
          cd frontend
          npm run lint --if-present

      - name: Build frontend
        run: |
          cd frontend
          npm run build

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    name: Build and Push Docker Images
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/das-proekt-crypto-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/das-proekt-crypto-backend:${{ env.IMAGE_TAG }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/das-proekt-crypto-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/das-proekt-crypto-frontend:${{ env.IMAGE_TAG }}

      - name: Build and push scheduler image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./scheduler/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/das-proekt-crypto-scheduler:latest
            ${{ secrets.DOCKER_USERNAME }}/das-proekt-crypto-scheduler:${{ env.IMAGE_TAG }}

      - name: Build and push analyzer image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./analyze/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/das-proekt-crypto-analyzer:latest
            ${{ secrets.DOCKER_USERNAME }}/das-proekt-crypto-analyzer:${{ env.IMAGE_TAG }}
