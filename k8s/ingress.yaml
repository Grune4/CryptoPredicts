apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: crypto-app-ingress
  namespace: crypto-app
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/enable-cors: "true"
spec:
  ingressClassName: nginx
  rules:
  - host: "localhost"
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 8080
      - path: /analyze
        pathType: Prefix
        backend:
          service:
            name: analyzer-service
            port:
              number: 8000
  - host: "crypto-app.local"
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 8080
      - path: /analyze
        pathType: Prefix
        backend:
          service:
            name: analyzer-service
            port:
              number: 8000
